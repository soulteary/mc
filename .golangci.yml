version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - staticcheck
  settings:
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
        - "-QF1001"
        - "-QF1002"
        - "-QF1003"
        - "-QF1004"
        - "-QF1007"
        - "-QF1008"
        - "-QF1012"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - text: "instead of using struct literal"
        linters:
          - staticcheck
      - text: "should have a package comment"
        linters:
          - staticcheck
      - text: "error strings should not be capitalized or end with punctuation or a newline"
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
